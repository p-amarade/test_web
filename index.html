<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>playground</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@600&family=IBM+Plex+Sans+Thai:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#E9EDF3; --ink:#1B2A41; --sub:#5C6B80;
    --key:#FFFFFF; --key-edge:#C9D2DE; --accent:#FF6B5E;
  }
  *{box-sizing:border-box;margin:0}
  body{
    font-family:'IBM Plex Sans Thai',sans-serif;
    background:var(--bg); color:var(--ink);
    min-height:100vh; display:flex; flex-direction:column;
    align-items:center; justify-content:center; padding:48px 20px;
  }
  h1{font-family:'IBM Plex Mono',monospace; font-size:1.4rem; letter-spacing:.05em}
  h1 span{color:var(--accent)}
  p.tag{color:var(--sub); margin:8px 0 40px; font-size:.95rem}
  .keys{display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
    gap:18px; width:100%; max-width:560px}
  a.key{
    display:block; text-decoration:none; color:var(--ink);
    background:var(--key); border-radius:14px; padding:20px 18px 16px;
    border:1px solid var(--key-edge);
    box-shadow:0 4px 0 var(--key-edge);
    transition:transform .08s, box-shadow .08s;
  }
  a.key:hover,a.key:focus-visible{transform:translateY(2px); box-shadow:0 2px 0 var(--key-edge); outline:none}
  a.key:focus-visible{border-color:var(--accent)}
  .letter{font-family:'IBM Plex Mono',monospace; font-size:1.6rem; color:var(--accent)}
  .name{font-weight:600; margin-top:6px}
  .desc{font-size:.82rem; color:var(--sub)}
  footer{margin-top:48px; font-size:.8rem; color:var(--sub)}
  @media (prefers-reduced-motion:reduce){a.key{transition:none}}
</style>
</head>
<body>
  <h1>&lt;playground<span>/</span>&gt;</h1>
  <p class="tag">ของเล่นเล็กๆ ที่เขียนเอง ทดลองเอง</p>

  <nav class="keys">
    <a class="key" href="/q/">
      <div class="letter">Q</div>
      <div class="name">QR Code</div>
      <div class="desc">สร้าง QR จากข้อความหรือลิงก์</div>
    </a>
    <a class="key" href="/n/">
      <div class="letter">N</div>
      <div class="name">Notepad</div>
      <div class="desc">จดโน้ตเร็วๆ เก็บในเครื่อง</div>
    </a>
  </nav>

  <footer>deploy ด้วย Vercel · เพิ่มแอปใหม่ = เพิ่มโฟลเดอร์ใหม่</footer>
</body>
</html>
