<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>N · Notepad</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@600&family=IBM+Plex+Sans+Thai:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root{--bg:#E9EDF3;--ink:#1B2A41;--sub:#5C6B80;--key:#fff;--edge:#C9D2DE;--accent:#FF6B5E}
  *{box-sizing:border-box;margin:0}
  body{font-family:'IBM Plex Sans Thai',sans-serif;background:var(--bg);color:var(--ink);
    min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:48px 20px}
  .wrap{width:100%;max-width:640px}
  a.back{color:var(--sub);text-decoration:none;font-size:.9rem}
  a.back:hover{color:var(--accent)}
  header{display:flex;justify-content:space-between;align-items:baseline;margin:24px 0 16px}
  h1{font-family:'IBM Plex Mono',monospace;font-size:1.2rem}
  h1 b{color:var(--accent)}
  #status{font-size:.8rem;color:var(--sub)}
  textarea{width:100%;min-height:60vh;font:inherit;line-height:1.7;padding:20px;
    background:var(--key);border:1px solid var(--edge);border-radius:14px;
    box-shadow:0 4px 0 var(--edge);resize:vertical}
  textarea:focus{outline:2px solid var(--accent);border-color:transparent}
  .actions{margin-top:14px;display:flex;gap:10px}
  button{padding:10px 18px;font:inherit;font-weight:600;border:1px solid var(--edge);
    border-radius:10px;background:var(--key);cursor:pointer;color:var(--ink)}
  button:hover{border-color:var(--accent);color:var(--accent)}
</style>
</head>
<body>
<div class="wrap">
  <a class="back" href="/">← playground</a>
  <header>
    <h1><b>N</b> · Notepad</h1>
    <span id="status">บันทึกอัตโนมัติในเครื่องนี้</span>
  </header>
  <textarea id="note" placeholder="พิมพ์อะไรก็ได้ ระบบบันทึกให้เองทุกครั้งที่หยุดพิมพ์…"></textarea>
  <div class="actions">
    <button onclick="copyNote()">คัดลอกทั้งหมด</button>
    <button onclick="clearNote()">ล้างโน้ต</button>
  </div>
</div>
<script>
const ta=document.getElementById('note');
const status=document.getElementById('status');
const KEY='playground-note';
ta.value=localStorage.getItem(KEY)||'';
let timer;
ta.addEventListener('input',()=>{
  clearTimeout(timer);
  status.textContent='กำลังพิมพ์…';
  timer=setTimeout(()=>{
    localStorage.setItem(KEY,ta.value);
    status.textContent='บันทึกแล้ว ✓';
  },500);
});
function copyNote(){
  navigator.clipboard.writeText(ta.value).then(()=>status.textContent='คัดลอกแล้ว ✓');
}
function clearNote(){
  if(ta.value && !confirm('ล้างโน้ตทั้งหมด?'))return;
  ta.value=''; localStorage.removeItem(KEY); status.textContent='ล้างแล้ว';
}
</script>
</body>
</html>
